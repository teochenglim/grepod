<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>grepod</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>grepod</h1>
    <span class="sub">Kubernetes-native log search, no Loki required</span>
  </header>

  <div class="toolbar">
    <input type="date" id="start">
    <input type="date" id="end">
    <input type="text" id="query" placeholder="Search logs... (press Enter)">
    <button id="searchBtn">Search</button>
  </div>

  <div class="status" id="status">Ready.</div>
  <div id="results"><div class="empty">Enter a keyword and press Search.</div></div>

<script src="/static/app.js"></script>
</body>
</html>
