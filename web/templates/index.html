<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>grepod</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>grepod</h1>
    <span class="sub">Kubernetes-native log search, no Loki required</span>
    <div class="mode-toggle">
      <button id="modeSearchBtn" class="mode-btn active" type="button">Search</button>
      <button id="modeTailBtn" class="mode-btn" type="button">Tail</button>
    </div>
  </header>

  <section id="searchView">
    <div class="toolbar">
      <select id="searchPod"><option value="">All pods</option></select>
      <input type="date" id="start">
      <input type="date" id="end">
      <input type="text" id="query" placeholder="Filter logs... (optional, press Enter)">
      <button id="searchBtn">Search</button>
      <label class="group-toggle"><input type="checkbox" id="groupToggle"> Group occurrences</label>
    </div>

    <div class="level-tabs" id="levelTabs">
      <button class="level-tab active" data-level="">ALL</button>
      <button class="level-tab level-fatal" data-level="FATAL">FATAL</button>
      <button class="level-tab level-error" data-level="ERROR">ERROR</button>
      <button class="level-tab level-warn" data-level="WARN">WARN</button>
      <button class="level-tab level-info" data-level="INFO">INFO</button>
      <button class="level-tab level-debug" data-level="DEBUG">DEBUG</button>
    </div>

    <div class="status" id="status">Loading logs...</div>
    <div id="results"><div class="empty">Loading logs...</div></div>
    <div class="load-more-wrap"><button id="loadMoreBtn" hidden>Load more</button></div>
  </section>

  <section id="tailView" hidden>
    <div class="toolbar">
      <select id="tailPod"><option value="">All pods</option></select>
      <select id="tailContainer"><option value="">All containers</option></select>
      <input type="text" id="tailQuery" placeholder="Filter tail (substring, press Enter)">
      <button id="tailStartBtn">Start</button>
      <button id="tailStopBtn" hidden>Stop</button>
    </div>

    <div class="status" id="tailStatus">Not connected.</div>
    <div id="tailResults"><div class="empty">Press Start to begin live tailing.</div></div>
    <button id="tailResumeBtn" hidden>New lines &#8595; Resume auto-scroll</button>
  </section>

<script src="/static/app.js"></script>
</body>
</html>
