apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grepod.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "grepod.labels" . | nindent 4 }}
spec:
  # Pinned to 1: a second replica would double-ingest every log line (two
  # tailers watching the same namespace) and /data is a ReadWriteOnce
  # volume. See DESIGN/03_design_storage.md#why-not-horizontal-scale-out.
  replicas: 1
  strategy:
    type: Recreate # avoid two replicas ever mounting the RWO volume at once
  selector:
    matchLabels:
      {{- include "grepod.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "grepod.selectorLabels" . | nindent 8 }}
      annotations:
        # /metrics (v0.7.0) is served on the same port as everything else
        # — grepod is a single HTTP server, not a sidecar-per-concern
        # setup — so scraping it needs no extra containerPort, just these
        # annotations naming the existing one. Works with the classic
        # annotation-based Prometheus scrape config
        # (kubernetes_sd_configs: pod); set .Values.serviceMonitor.enabled
        # instead if your cluster runs the Prometheus Operator.
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.targetPort | default 8080 }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "grepod.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot | default true }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser | default 65532 }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup | default 65532 }}
      containers:
        - name: grepod
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            # Downward API: always exactly the namespace/pod this
            # container is actually running in — can't drift from
            # .Values.namespace the way a manually-set ConfigMap value
            # could.
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "grepod.fullname" . }}-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "grepod.fullname" . }}-data
