{{- if .Values.ingress.enabled -}}
# grepod has no built-in auth — put an auth layer in front (an
# ingress-nginx auth-basic/auth-url annotation, or an OAuth2 proxy) before
# exposing this beyond the cluster. See helm/README.md.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "grepod.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "grepod.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "grepod.fullname" . }}
                port:
                  number: {{ .Values.service.port | default 80 }}
{{- end }}
