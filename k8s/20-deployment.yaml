apiVersion: apps/v1
kind: Deployment
metadata:
  name: grepod
  namespace: default
  labels:
    app.kubernetes.io/name: grepod
spec:
  # Pinned to 1: grepod's tailer would double-ingest every log line with a
  # second replica, and /data is a ReadWriteOnce volume. See
  # DESIGN/03_design_storage.md#why-not-horizontal-scale-out.
  replicas: 1
  strategy:
    type: Recreate # avoid two replicas ever mounting the RWO volume at once
  selector:
    matchLabels:
      app.kubernetes.io/name: grepod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grepod
    spec:
      serviceAccountName: grepod
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: grepod
          image: "grepod:latest" # replace with your built/pushed image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: grepod-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
            requests:
              memory: 128Mi
              cpu: 100m
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grepod-data
