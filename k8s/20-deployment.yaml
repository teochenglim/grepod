apiVersion: apps/v1
kind: Deployment
metadata:
  name: grepod
  namespace: default
  labels:
    app.kubernetes.io/name: grepod
spec:
  # Pinned to 1: grepod's tailer would double-ingest every log line with a
  # second replica, and /data is a ReadWriteOnce volume. See
  # DESIGN/03_design_storage.md#why-not-horizontal-scale-out.
  replicas: 1
  strategy:
    type: Recreate # avoid two replicas ever mounting the RWO volume at once
  selector:
    matchLabels:
      app.kubernetes.io/name: grepod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grepod
      annotations:
        # /metrics (v0.7.0) is served on the same port as everything else
        # — grepod is a single HTTP server, not a sidecar-per-concern
        # setup — so scraping it needs no extra containerPort, just these
        # annotations naming the existing one. Works with the classic
        # annotation-based Prometheus scrape config
        # (kubernetes_sd_configs: pod); see helm/templates/servicemonitor.yaml
        # (values-gated, off by default) if your cluster runs the
        # Prometheus Operator instead.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: grepod
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: grepod
          # Published by .github/workflows/release.yml's docker job on
          # every tagged release. Note: no "v" prefix, unlike the git tag
          # it's built from — docker/metadata-action's
          # type=semver,pattern={{version}} strips it. Kept in sync with
          # VERSION by `make bump`/`make release` (regex-replaced, not
          # hand-edited — see Makefile). Point this at your own
          # registry/build if you forked or build locally
          # (`make docker-build`).
          image: "ghcr.io/teochenglim/grepod:0.7.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            # Downward API: always exactly the namespace/pod this
            # container is actually running in — can't drift from
            # metadata.namespace above the way a manually-set ConfigMap
            # value could.
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: grepod-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
            requests:
              memory: 128Mi
              cpu: 100m
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grepod-data
