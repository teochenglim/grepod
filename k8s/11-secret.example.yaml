# grepod ships with no required secrets today — the search UI has no auth
# of its own (see k8s/README.md for how to put it behind Ingress auth).
# This file is a placeholder for future use (e.g. basic-auth credentials
# for the UI, or TLS material). Copy it to 11-secret.yaml, fill in real
# values, and `kubectl apply -f k8s/11-secret.yaml` — the real file is
# gitignored so it never gets committed.
apiVersion: v1
kind: Secret
metadata:
  name: grepod-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: grepod
type: Opaque
stringData: {}
