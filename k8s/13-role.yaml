apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grepod
  namespace: default
  labels:
    app.kubernetes.io/name: grepod
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grepod
  namespace: default
  labels:
    app.kubernetes.io/name: grepod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grepod
subjects:
  - kind: ServiceAccount
    name: grepod
    namespace: default
